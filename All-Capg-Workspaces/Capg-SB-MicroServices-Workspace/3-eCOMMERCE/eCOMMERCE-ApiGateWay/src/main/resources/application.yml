server:
  port: 9080   #  

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: order-service
          uri: lb://ORDER-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/order/**
 
        - id: product-service
          uri: lb://PRODUCT-SERVICE  # SERVICE NAME, NOT PORT
          predicates:
            - Path=/product/**
      
        - id: inventory-service
          uri: lb://INVENTORY-SERVICE   # SERVICE NAME, NOT PORT
          predicates:
            - Path=/inventory/**